<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoxPulse</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
  <div class="container">
    <h1 class="app-title">StoxPulse</h1>
    <form id="stockForm">
      <input type="text" id="symbolInput" placeholder="Enter Stock Symbol (e.g. INFY)" required />
      <button type="submit">Search</button>
    </form>

    <div id="loader" class="hidden">Loading...</div>
    <div id="stockBox" class="hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
